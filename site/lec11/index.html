    <script>
      function extend() {
        var target = {};
        for (var i = 0; i < arguments.length; i++) {
          var source = arguments[i];
          for (var key in source) {
            if (source.hasOwnProperty(key)) {
              target[key] = source[key];
            }
          }
        }
        return target;
      }

      // default options to init reveal.js
      var defaultOptions = {
        controls: true,
        progress: true,
        history: true,
        center: true,
        transition: 'default', // none/fade/slide/convex/concave/zoom
        slideNumber: true,
        plugins: [
          RevealMarkdown,
          RevealHighlight,
          RevealZoom,
          RevealNotes,
          RevealMath.MathJax3
        ]
      };

      // options from URL query string
      var queryOptions = Reveal().getQueryHash() || {};

      var options = extend(defaultOptions, {"transition":"fade","transitionSpeed":"fast","center":false,"slideNumber":"c/t","width":1000,"_":["./src/1-2/lec11.md"],"scripts":"https://cdn.tonycrane.cc/heti/heti.js,js/heti_worker.js","template":"template.html","static":"../site/lec11","assets-dir":"assets","assetsDir":"assets"}, queryOptions);
    </script>

    <script>
      Reveal.initialize(options).then(() => {
        document.querySelector(".backgrounds").setAttribute("style", document.querySelector(".slides").style.cssText);
        
        // Load heti_worker.js after Heti library is ready
        function loadHetiWorker() {
          if (typeof Heti !== 'undefined') {
            const hetiScript = document.createElement('script');
            hetiScript.src = 'assets/js/heti_worker.js';
            document.head.appendChild(hetiScript);
          } else {
            setTimeout(loadHetiWorker, 100);
          }
        }
        loadHetiWorker();
      });
      Reveal.on('overviewshown', event => {
        document.querySelector(".backgrounds").setAttribute("style", "");
      });
      Reveal.on('overviewhidden', event => {
        document.querySelector(".backgrounds").setAttribute("style", document.querySelector(".slides").style.cssText);
      });
      Reveal.on('resize', event => {
        document.querySelector(".backgrounds").setAttribute("style", document.querySelector(".slides").style.cssText);
      });
    </script>
